<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deep Work</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">
          <span class="logo-icon">🎯</span>
          <span class="logo-text">Deep Work</span>
        </div>
        <button
          id="settingsBtn"
          class="icon-btn"
          title="Settings"
          aria-label="Open settings"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
            />
          </svg>
        </button>
      </header>

      <!-- Profile selector -->
      <div class="profile-row">
        <label for="profileSelect" class="sr-only">Profile</label>
        <select id="profileSelect" class="profile-select"></select>
      </div>

      <!-- Timer ring -->
      <div class="timer-section">
        <div class="timer-ring-wrapper">
          <svg
            class="timer-ring"
            viewBox="0 0 120 120"
            width="160"
            height="160"
          >
            <circle class="ring-bg" cx="60" cy="60" r="52" />
            <circle
              id="ringProgress"
              class="ring-progress"
              cx="60"
              cy="60"
              r="52"
            />
          </svg>
          <div class="timer-center">
            <div id="phaseLabel" class="phase-label">IDLE</div>
            <div id="timerDisplay" class="timer-display">00:00</div>
            <div id="cycleDisplay" class="cycle-display">0 / 4</div>
          </div>
        </div>
      </div>

      <!-- Task input (shown when idle) -->
      <div id="taskRow" class="task-row">
        <input
          id="taskInput"
          type="text"
          class="task-input"
          placeholder="What are you working on?"
          maxlength="80"
          autocomplete="off"
        />
      </div>

      <!-- Active task label (shown during session) -->
      <div id="activeTaskRow" class="active-task-row hidden">
        <span class="active-task-icon">📌</span>
        <span id="activeTaskLabel" class="active-task-text"></span>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="startBtn" class="btn btn-primary">Start Focus</button>
        <button id="skipBtn" class="btn btn-secondary hidden">Skip</button>
        <button id="stopBtn" class="btn btn-danger hidden">Stop</button>
      </div>

      <!-- Stats bar -->
      <div class="stats-bar">
        <div class="stat">
          <span id="todayCount" class="stat-value">0</span>
          <span class="stat-label">today</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span id="todayMinutes" class="stat-value">0m</span>
          <span class="stat-label">focused</span>
        </div>
      </div>
    </div>

    <script type="module" src="popup.ts"></script>
  </body>
</html>
